name: bioinformatics-agent-staging

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VCS_REF: ${BIOINFO_BUILD_ID:-local-uncommitted}
    image: bioinformatics-agent-api:${BIOINFO_IMAGE_TAG:-phase-8-5-local}
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    user: "10001:10001"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      BIOINFO_REQUIRE_API_KEY: "true"
      BIOINFO_API_KEY_HEADER: X-Bioinfo-API-Key
      BIOINFO_API_KEY_FILE: /run/secrets/bioinfo_api_key
      BIOINFO_INPUT_ROOT: /var/lib/bioinfo/inputs
      BIOINFO_OUTPUT_ROOT: /var/lib/bioinfo/artifacts
      BIOINFO_TASK_STORE_PATH: /var/lib/bioinfo/state/tasks.sqlite3
      BIOINFO_MAX_REQUEST_BYTES: "10485760"
      BIOINFO_REQUEST_TIMEOUT_SECONDS: "120"
      BIOINFO_MAX_METADATA_BYTES: "1048576"
      BIOINFO_MAX_COUNT_MATRIX_BYTES: "10485760"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: "300"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      RATE_LIMIT_SCOPE: ip
      RATE_LIMIT_EXEMPT_PATHS: /health,/docs,/openapi.json
      BIOINFO_ENVIRONMENT: staging-local
      BIOINFO_LOG_LEVEL: info
      BIOINFO_BUILD_ID: ${BIOINFO_BUILD_ID:-local-uncommitted}
      RUN_MODE: mock
    secrets:
      - bioinfo_api_key
    volumes:
      - ./data/demo:/var/lib/bioinfo/inputs:ro
      - staging_state:/var/lib/bioinfo/state
      - staging_artifacts:/var/lib/bioinfo/artifacts
    expose:
      - "8000"
    networks:
      - staging_backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 6

  proxy:
    image: nginxinc/nginx-unprivileged:1.27.5-alpine
    user: "101:101"
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    tmpfs:
      - /tmp:rw,noexec,nosuid,uid=101,gid=101,mode=1777,size=32m
      - /var/cache/nginx:rw,noexec,nosuid,uid=101,gid=101,mode=0700,size=32m
      - /var/run:rw,noexec,nosuid,uid=101,gid=101,mode=0700,size=8m
    volumes:
      - ./deploy/staging/nginx.conf:/etc/nginx/nginx.conf:ro
    secrets:
      - staging_tls_certificate
      - staging_tls_private_key
    networks:
      - staging_backend
      - staging_edge
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--spider", "https://127.0.0.1:8443/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 6

secrets:
  bioinfo_api_key:
    file: ./.staging-secrets/api_key.txt
  staging_tls_certificate:
    file: ./.staging-secrets/staging.crt
  staging_tls_private_key:
    file: ./.staging-secrets/staging.key

volumes:
  staging_state:
  staging_artifacts:

networks:
  staging_backend:
    internal: true
  staging_edge:
