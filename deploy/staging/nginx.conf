worker_processes 1;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format staging_safe '$remote_addr - $request_method $uri '
                            'status=$status bytes=$body_bytes_sent '
                            'request_id=$upstream_http_x_request_id';
    access_log /dev/stdout staging_safe;
    error_log /dev/stderr warn;

    client_max_body_size 10m;
    client_body_timeout 30s;
    send_timeout 130s;
    keepalive_timeout 30s;

    upstream bioinfo_api {
        server api:8000;
        keepalive 8;
    }

    server {
        listen 8080;
        server_name _;
        return 308 https://localhost:8443$request_uri;
    }

    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate /run/secrets/staging_tls_certificate;
        ssl_certificate_key /run/secrets/staging_tls_private_key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_tickets off;
        ssl_session_cache shared:staging_tls:1m;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;

        location / {
            proxy_pass http://bioinfo_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host localhost;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_pass_request_headers on;
            proxy_hide_header Server;
            proxy_connect_timeout 5s;
            proxy_send_timeout 130s;
            proxy_read_timeout 130s;
            proxy_request_buffering on;
            proxy_buffering off;
        }
    }
}
